<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Input using JS</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    text-align:center;
    font-size:larger;
}

label,input,button{
    margin-bottom:10px;
}

#result{
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Even Or Odd</h1>

<label for="num">Enter a number:</label>

<input type="number" id="num" name="num">

<button onclick="checkEven()">Check</button>

<p id="result"></p>

<script>

const input = document.getElementById('num');

const result = document.getElementById('result');

function checkEven(){

    const value = parseInt(input.value);

    if(isNaN(value)){

        alert("Please enter a valid number.");

    }

    else if(value % 2 === 0){

        result.textContent = "The number is even.";

    }

    else{

        result.textContent = "The number is odd.";

    }
}

</script>

</body>

</html>
